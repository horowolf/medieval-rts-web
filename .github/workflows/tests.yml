name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ubuntu-latest ships Google Chrome, but the binary name/path drifts with
      # the runner image (google-chrome vs google-chrome-stable). Resolve the
      # real path once and reuse it, rather than hard-coding /usr/bin/google-chrome
      # (which a 2026 image update removed, breaking the build here).
      - name: Locate Chrome
        id: chrome
        run: |
          BIN="$(command -v google-chrome || command -v google-chrome-stable)"
          if [ -z "$BIN" ]; then echo "No Chrome binary found"; exit 1; fi
          ls -la /usr/bin/google-chrome* || true
          echo "Using $BIN"; "$BIN" --version
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"

      # The two published builds must simulate identically: this is what proves
      # translating the interface did not touch the game.
      - name: Builds are the same game
        env:
          CHROME: ${{ steps.chrome.outputs.bin }}
          CHROME_ARGS: --no-sandbox
        run: node tools/verify-builds.mjs

      - name: Regression suite
        env:
          CHROME: ${{ steps.chrome.outputs.bin }}
          CHROME_ARGS: --no-sandbox
        run: node tests/headless-test.mjs
